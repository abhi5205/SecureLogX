version: "3.9"

services:
  db:
    image: postgres:15
    container_name: securelogx_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abhi1111
      POSTGRES_DB: securelogx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: securelogx_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
  

volumes:
  postgres_data: